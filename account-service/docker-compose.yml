services:
  mysql:
    image: mysql:8.3.0
    container_name: account-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3316:3306"
    volumes:
      - ./mysql:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.4
    container_name: account-service-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/data